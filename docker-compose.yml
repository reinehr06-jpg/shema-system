version: '3.8'

services:
  app:
    build: .
    container_name: shema_app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./shema.db:/app/shema.db
      - ./public/uploads:/app/public/uploads
    environment:
      - PORT=3000
    depends_on:
      - redis
      - evolution-api
    networks:
      - shema-network

  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: shema_evolution_api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./evolution-api/.env
    volumes:
      - ./evolution-api/instances:/evolution/instances
    networks:
      - shema-network

  redis:
    image: redis:alpine
    container_name: shema_redis
    restart: always
    networks:
      - shema-network

  nginx:
    image: nginx:alpine
    container_name: shema_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - shema-network

networks:
  shema-network:
    driver: bridge
