version: '3.8'

services:
  app:
    build: .
    container_name: shema_app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - shema_db_data:/data
    environment:
      - PORT=3000
      - DATABASE_PATH=/data/shema.db
    depends_on:
      - redis
      - evolution-api
    networks:
      - shema-network

  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: shema_evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=CHANGE_THIS_API_KEY
      - DATABASE_ENABLED=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - shema-network

  redis:
    image: redis:alpine
    container_name: shema_redis
    restart: always
    networks:
      - shema-network

  nginx:
    image: nginx:alpine
    container_name: shema_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - shema-network

networks:
  shema-network:
    driver: bridge

volumes:
  shema_db_data:
  evolution_instances:
